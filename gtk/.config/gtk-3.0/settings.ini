# Void Glow — GTK3 settings
# Theme files live in ~/.themes/Tokyonight-Dark (installed from
# Fausto-Korpsvart/Tokyo-Night-GTK-Theme, not stow-tracked - too large).
# Only this settings file is tracked; theme is re-installed via install.sh.

[Settings]
gtk-theme-name=Tokyonight-Dark
gtk-icon-theme-name=Tela-circle-dark
gtk-cursor-theme-name=Adwaita
gtk-font-name=JetBrainsMono Nerd Font Mono 10
gtk-application-prefer-dark-theme=true
gtk-decoration-layout=close,minimize,maximize:
gtk-toolbar-style=GTK_TOOLBAR_ICONS
gtk-button-images=1
gtk-menu-images=1
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
