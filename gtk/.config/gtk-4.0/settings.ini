# Void Glow — GTK4 / libadwaita settings
# Note: gtk-application-prefer-dark-theme is GTK3-only; libadwaita
# uses AdwStyleManager (set via env var GTK_THEME or per-app).
# Most "deprecated" GTK3 keys are dropped here.

[Settings]
gtk-theme-name=Tokyonight-Dark
gtk-icon-theme-name=Tela-circle-dark
gtk-cursor-theme-name=Adwaita
gtk-font-name=JetBrainsMono Nerd Font Mono 10
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
