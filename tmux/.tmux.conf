# ─────────────────────────────────────────────────────────
# VOID GLOW — tmux config
# Colors mirror ~/.config/theme/colors.sh
# ─────────────────────────────────────────────────────────

# ── Prefix: Ctrl-a (closer to home row than default Ctrl-b) ─
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── 256-color + true color so Void Glow renders correctly ──
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-kitty:Tc"

# ── Sane defaults ──────────────────────────────────────────
set -g mouse on                 # mouse for resize/scroll/select
set -g history-limit 50000      # big scrollback; HTB output is verbose
set -g base-index 1             # windows start at 1, not 0
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # close window 2, window 3 becomes 2
set -g escape-time 10           # near-zero esc delay for nvim responsiveness
set -g focus-events on          # nvim autoread works inside tmux

# ── Splits: visual keys (| and -) ──────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # vertical split
bind - split-window -v -c "#{pane_current_path}"   # horizontal split
# New windows open in current pane's dir too
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation: vim keys ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Reload config without restart ──────────────────────────
bind r source-file ~/.tmux.conf \; display "reloaded"

# ─────────────────────────────────────────────────────────
# Theme — Void Glow palette (mirrors colors.sh)
# ─────────────────────────────────────────────────────────

# Status bar position & basic style
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#131318,fg=#e2e8f0"     # SURFACE bg, TEXT fg
set -g status-interval 5

# Left: session name in teal block
set -g status-left-length 30
set -g status-left "#[bg=#5eead4,fg=#0d0d0f,bold] #S #[bg=#131318,fg=#5eead4]#[default] "

# Right: hostname + time, subtext muted
set -g status-right-length 60
set -g status-right "#[fg=#64748b]#h #[fg=#1c1c24]│ #[fg=#5eead4]%H:%M #[fg=#1c1c24]│ #[fg=#818cf8]%d %b "

# Window list — inactive recessive, active glows teal
setw -g window-status-format "#[fg=#64748b] #I:#W "
setw -g window-status-current-format "#[bg=#1c1c24,fg=#5eead4,bold] #I:#W "
setw -g window-status-activity-style "fg=#f87171"   # RED for activity in other windows

# Panes
set -g pane-border-style "fg=#1c1c24"               # OVERLAY — recessive
set -g pane-active-border-style "fg=#5eead4"        # TEAL — the active edge glow

# Command-line / message style
set -g message-style "bg=#1c1c24,fg=#5eead4"        # OVERLAY bg, TEAL fg
set -g message-command-style "bg=#1c1c24,fg=#818cf8" # INDIGO for command mode

# Selection / copy mode
setw -g mode-style "bg=#5eead4,fg=#0d0d0f"          # selection: TEAL bg, BASE text
