# ─────────────────────────────────────────────────────────
# VOID GLOW — hyprlock
# Lockscreen: live blurred screen + big clock + password field.
# Palette mirrors ~/.config/theme/colors.sh
# ─────────────────────────────────────────────────────────

general {
    hide_cursor = true
}

# ── Background: live screen blurred ──────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 12         # extreme — would be soup if shaders ran
    blur_size = 20
    noise = 0.0117
    contrast = 0.9
    brightness = 0.85
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

# ── Big clock — top third, dominant ──────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgb(e2e8f0)             # VOID_TEXT
    font_size = 120
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 280               # offset from center, upward
    halign = center
    valign = center
}

# ── Small date below clock — muted, recessive ────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgb(64748b)             # VOID_SUBTEXT
    font_size = 16
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 160               # below the clock
    halign = center
    valign = center
}

# ── Password field — centered, the only interactive element ─
input-field {
    monitor =
    size = 360, 50
    position = 0, -40               # slightly below true center
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1              # circle dots

    outer_color = rgb(5eead4)       # VOID_ACCENT_TEAL — glow border
    inner_color = rgb(1c1c24)       # VOID_OVERLAY — inset depth
    font_color = rgb(e2e8f0)        # VOID_TEXT
    fade_on_empty = false
    rounding = 8

    placeholder_text = <span foreground="##64748b">password</span>
    hide_input = false
    check_color = rgb(818cf8)       # VOID_ACCENT_INDIGO during check
    fail_color = rgb(f87171)        # VOID_RED on wrong password
    fail_text = <span foreground="##f87171">wrong</span>
    capslock_color = rgb(f87171)    # VOID_RED warns capslock on
}
