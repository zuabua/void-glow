# ─────────────────────────────────────────────────────────
# VOID GLOW — Workspace rules
# ─────────────────────────────────────────────────────────
# Mirrors monitors.conf VM/bare-metal toggle. Comment one
# block, uncomment the other, to switch.
# ─────────────────────────────────────────────────────────


# ━━━ ACTIVE: VM (single Virtual-1) ━━━━━━━━━━━━━━━━━━━━━━
# All workspaces on the only display. Workspace 1 default.
workspace = 1, monitor:Virtual-1, default:true
workspace = 2, monitor:Virtual-1
workspace = 3, monitor:Virtual-1
workspace = 4, monitor:Virtual-1
workspace = 5, monitor:Virtual-1
workspace = 6, monitor:Virtual-1
workspace = 7, monitor:Virtual-1
workspace = 8, monitor:Virtual-1
workspace = 9, monitor:Virtual-1
workspace = 10, monitor:Virtual-1


# ━━━ BARE METAL: 1440p primary (right) + 4K secondary (left) ━
# Uncomment when monitor names match real hardware.
#
# Primary (1440p, daily work) - workspaces 1-5
# workspace = 1, monitor:DP-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1
# workspace = 5, monitor:DP-1
#
# Secondary (4K, auxiliary - reference, widgets) - workspaces 6-10
# workspace = 6, monitor:HDMI-A-1, default:true
# workspace = 7, monitor:HDMI-A-1
# workspace = 8, monitor:HDMI-A-1
# workspace = 9, monitor:HDMI-A-1
# workspace = 10, monitor:HDMI-A-1
