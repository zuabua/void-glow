# ─────────────────────────────────────────────────────────
# VOID GLOW — Workspace rules
# ─────────────────────────────────────────────────────────
# Assigns workspaces to monitors. Hyprland silently falls back
# to an available monitor if the named one doesn't exist, so
# these rules are safe to commit pre-bare-metal — they activate
# automatically when the right monitors come online.
#
# Layout: workspaces 1-5 on primary (1440p, right),
#         workspaces 6-10 on secondary (4K, left).
#
# Update monitor names to match monitors.conf if you renamed there.
# ─────────────────────────────────────────────────────────

# Primary (1440p, daily work)
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1

# Secondary (4K, auxiliary - reference, monitoring, video, widgets)
workspace = 6, monitor:HDMI-A-1, default:true
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
