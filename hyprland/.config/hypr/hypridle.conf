# ─────────────────────────────────────────────────────────
# VOID GLOW — hypridle
# Idle action chain: dim -> lock -> suspend.
# Thresholds in seconds.
# ─────────────────────────────────────────────────────────

general {
    lock_cmd = pidof hyprlock || hyprlock        # avoid double-lock
    before_sleep_cmd = loginctl lock-session     # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on   # wake displays cleanly
}

# 5 min - dim the display (warning shot)
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# 10 min - lock
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# 15 min - turn off displays + suspend to RAM
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
