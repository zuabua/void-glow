# Void glow monitor configuration
#
# this is very environment specific so please change it to suit your needs.
#
# find your monitor names with:
#   hyprctl monitors all



# ━━━ ACTIVE: VM (KVM/QEMU virtual display) ━━━━━━━━━━━━━━━
# Single virtual display. Delete or comment this block on bare metal.
monitor = Virtual-1, 2560x1440@60, 0x0, 1


# ━━━ BARE METAL: 1440p primary (right) + 4K secondary (left) ━
# Uncomment these on bare metal. Verify names with hyprctl monitors.
# Layout:
#   [  4K secondary 3840x2160 at 0,0  ][  1440p primary 2560x1440 at 3840,0  ]
#       scale 1.5 -> effective 2560 wide   scale 1.0 -> native
#
# monitor = HDMI-A-1, 3840x2160@60, 0x0, 1.5
# monitor = DP-1,     2560x1440@60, 3840x0, 1
#
# Notes:
# - HDMI-A-1 / DP-1 are placeholders. Your actual names depend on
#   which ports your monitors plug into. hyprctl monitors prints them.
# - @60 is a safe baseline. If your 1440p is 144Hz, change to @144.
#   hyprctl monitors all lists supported modes.
# - Mixed-DPI (scale 1.5 + scale 1.0 side by side) has historical
#   rough edges on Wayland (cursor jumps, some apps blurry). If issues,
#   try scale 1.0 on both (4K renders smaller text but no scaling
#   artifacts) or scale 2.0 on the 4K (crisper, but logical width
#   becomes 1920, smaller usable area).
